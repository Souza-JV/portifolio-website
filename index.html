<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portifólio</title>
    <link rel="stylesheet" href="/estilos/style.css">
    <script src="https://kit.fontawesome.com/ac52fd1507.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <section class="menu">
            <div class="logo">
                <img src="imagens/logo-js-tranparente.png" alt="">
            </div>

                <button id="menu-burg"><i class="fa-solid fa-bars"></i></button>
                
            <nav id="menu-pc" class="menu-pc">
                <button id="exit-menu-burg">
                    <i class="fa-solid fa-x"></i>
                </button>
                <div class="opcoes">
                    <a href="#">Inicio</a>
                    <a href="#">Sobre</a>
                    <a href="#">Projetos</a>
                    <a href="#">Habilidades</a>
                    <a href="#">Contato</a>
                </div>
            </nav>
        </section>
        <section class="banner">
            <div class="caixa-texto">
                <p class="destaque">Olá, eu sou</p>
                <h1 class="titulo">João Victor Souza</h1>
                <h2 class="titulo, destaque">Desenvolvedor Front-End</h2>
                <p class="texto">Faço sites modernos, responsivos e com foco na melhor experiencia para o usuario.</p>
            </div>
        </section>
        
    </header>
    
    <script>
        var menuBurg = document.getElementById('menu-burg')
        var menuExit = document.getElementById('exit-menu-burg')
        var menuPc = document.getElementById('menu-pc')

        menuBurg.addEventListener('click', () => {
            (menuPc.classList.toggle('ativo'))
        })

        menuExit.addEventListener('click', () => {
            (menuPc.classList.toggle('ativo'))
        })

    </script>
</body>
</html>
